<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Étudiants</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="auth-wrapper">
      
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>

        
        <div class="credentials-panel signin">
            <h1 class="slide-element">Gestion des Étudiants</h1>
            <h2 class="slide-element">Ajouter un Étudiant</h2>

            <div id="message-container" class="slide-element"></div>

            <form id="student-form">
                
                <div class="field-wrapper slide-element">
                    <input type="text" id="nom" required>
                    <label for="nom">Nom</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="text" id="prenom" required>
                    <label for="prenom">Prénom</label>
                    <i class="fa-solid fa-user-tag"></i>
                </div>

                
                <div class="field-wrapper slide-element">
                    <input type="email" id="email" required>
                    <label for="email">Email</label>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                
                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Ajouter</button>
                </div>
            </form>
        </div>

        <!-- Section Liste des étudiants (Côté droit) -->
        <div class="welcome-section signin">
            <h2 class="slide-element">LISTE DES ÉTUDIANTS</h2>
            
            <div class="table-container slide-element">
                <table id="student-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody id="student-list">
                        <!-- Les étudiants seront ajoutés dynamiquement ici -->
                    </tbody>
                </table>
            </div>

            <!-- Message quand la liste est vide -->
            <div id="empty-message" class="slide-element empty-message">
                <p>Aucun étudiant ajouté pour le moment.</p>
                <p style="font-size: 12px; margin-top: 5px;">Remplissez le formulaire pour commencer.</p>
            </div>
        </div>
    </div>

    <!-- Pied de page -->
    <div class="footer">
        <p>TP 1 - Programmation Web - ISMAI Kairouan
            & realisé par : <strong>Ammar Rayen</strong>
        </p>
    </div>

    <!-- Lien vers le fichier JavaScript -->
    <script src="script.js"></script>
</body>

</html>
